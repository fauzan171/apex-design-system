name = "apex-design-system"
main = "./worker.js"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

# Enable logging and monitoring
[observability]
enabled = true

# Static assets configuration for SPA
# The 'binding' field creates env.ASSETS for serving static files
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Environment variables (build-time)
# For runtime secrets, use: wrangler secret put <NAME>
# Or set in Cloudflare Dashboard: Workers > apex-design-system > Settings > Variables
[vars]
VITE_USE_MOCK_DATA = "false"
VITE_API_URL = ""
