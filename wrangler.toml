name = "apex-design-system"
main = "./worker.js"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

# Enable logging and monitoring
[observability]
enabled = true

# Static assets configuration for SPA
# The 'binding' field creates env.ASSETS for serving static files
# run_worker_first ensures Worker code runs BEFORE static assets for /api/* routes
# NOTE: When using @cloudflare/vite-plugin, the assets.directory is auto-generated
# but we need to specify routing configuration explicitly
[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# Environment variables (runtime)
# Set API_URL in Cloudflare Dashboard: Workers > apex-design-system > Settings > Variables
# Or use wrangler secret put API_URL for sensitive values
[vars]
API_URL = "https://appex-erp-be-staging.itobsidianmuda.workers.dev"
