        - Dashboard
      summary: Get project tracking
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        status:
                          type: string
                        progress:
                          type: number

  /api/v1/dashboard/alerts:
    get:
      tags:
        - Dashboard
      summary: Get alerts
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [production, inventory, purchasing, quality]
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
      responses:
        '200':
          description: Alert list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'

  /api/v1/dashboard/comparison:
    get:
      tags:
        - Dashboard
      summary: Get period comparison
      parameters:
        - name: currentStart
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: currentEnd
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: previousStart
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: previousEnd
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: planId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Comparison data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      currentPeriod:
                        type: object
                      previousPeriod:
                        type: object
                      change:
                        type: object
