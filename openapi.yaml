openapi: 3.0.3
info:
  title: AppEx ERP API
  description: |
    Comprehensive ERP system API covering authentication, user management, master data, 
    production planning, production execution, purchasing, warehouse management, and dashboard analytics.
    
    ## Authentication
    All protected endpoints require session-based authentication with JWT tokens.
    
    ## Permission System
    - Module-level permissions: `{module}:{action}`
    - Actions: `view`, `create`, `edit`, `delete`, `approve`, `cancel`, `start`, `complete`, `qc`, `inspect`, `issue`, `do`, `bast`, `reports`, `export`
    - Wildcard permission: `{module}:*` grants all permissions for that module
  version: 1.0.0
  contact:
    name: AppEx ERP Support

servers:
  - url: http://localhost:8787/api/v1
    description: Local development server
  - url: https://api.appex-erp.com/api/v1
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Users
    description: User management (Super Admin only)
  - name: Roles
    description: Role and permission management
  - name: Permissions
    description: Permission definitions and approvers
  - name: Profile
    description: Current user profile and permissions
  - name: Audit Logs
    description: System audit trail
  - name: Products
    description: Product master data management
  - name: BOM
    description: Bill of Materials management
  - name: Import/Export
    description: Data import and export operations
  - name: Production Planning
    description: Production plan creation and approval workflow
  - name: Production
    description: Work order execution and quality control
  - name: Purchasing
    description: Purchase requests and delivery orders
  - name: Warehouse
    description: Stock management, goods receipt/issue, and warehouse operations
  - name: Dashboard
    description: KPI dashboards and analytics
  - name: Health Check
    description: System health monitoring

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Session-based authentication with JWT token

  schemas:
    # ========== Common Schemas ==========
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Invalid input data

    # ========== Auth Schemas ==========
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user @appex.com
        password:
          type: string
          minLength: 6
          example: password123

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
        - confirmPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
        confirmPassword:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        department:
          type: string
          enum: [GA, FINANCE, PURCHASING, WAREHOUSE, PRODUCTION, QC, PLANNING, SALES]
        role:
          type: string
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ========== Role Schemas ==========
    CreateRoleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Warehouse Manager
        description:
          type: string
        permissionIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        permissionIds:
          type: array
          items:
            type: string
            format: uuid

    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ========== Permission Schemas ==========
    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        module:
          type: string
          example: warehouse
        action:
          type: string
          example: view
        description:
          type: string

    # ========== User Management Schemas ==========
    CreateUserRequest:
      type: object
      required:
        - email
        - fullName
        - department
      properties:
        email:
          type: string
          format: email
        fullName:
          type: string
        department:
          type: string
          enum: [GA, FINANCE, PURCHASING, WAREHOUSE, PRODUCTION, QC, PLANNING, SALES]
        password:
          type: string
          minLength: 6
        roleIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateUserRequest:
      type: object
      properties:
        fullName:
          type: string
        department:
          type: string
          enum: [GA, FINANCE, PURCHASING, WAREHOUSE, PRODUCTION, QC, PLANNING, SALES]
        roleIds:
          type: array
          items:
            type: string
            format: uuid

    ResetPasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
          minLength: 6

    # ========== Profile Schemas ==========
    UpdateProfileRequest:
      type: object
      properties:
        fullName:
          type: string
        department:
          type: string
          enum: [GA, FINANCE, PURCHASING, WAREHOUSE, PRODUCTION, QC, PLANNING, SALES]

    ChangeOwnPasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
        - confirmPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
        confirmPassword:
          type: string

    ActivityLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        userId:
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          type: object

    # ========== Audit Log Schemas ==========
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
          enum: [CREATE, UPDATE, DELETE, STATUS_CHANGE, APPROVAL, REJECTION]
        entityType:
          type: string
        entityId:
          type: string
        changedBy:
          type: string
        changedAt:
          type: string
          format: date-time
        changes:
          type: object

    # ========== Product Schemas ==========
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: FG-001
        name:
          type: string
        type:
          type: string
          enum: [FG, SEMI, RAW, PACKAGING, SPAREPART, SUPPORT]
        description:
          type: string
        baseUnit:
          type: string
          example: PCS
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required:
        - code
        - name
        - type
        - baseUnit
      properties:
        code:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [FG, SEMI, RAW, PACKAGING, SPAREPART, SUPPORT]
        description:
          type: string
        baseUnit:
          type: string

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        baseUnit:
          type: string

    # ========== BOM Schemas ==========
    BoM:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        product:
          $ref: '#/components/schemas/Product'
        status:
          type: string
          enum: [draft, active, inactive]
        items:
          type: array
          items:
            $ref: '#/components/schemas/BoMItem'
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BoMItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        materialId:
          type: string
          format: uuid
        material:
          $ref: '#/components/schemas/Product'
        quantityRequired:
          type: number
          format: decimal
        unit:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateBoMRequest:
      type: object
      required:
        - status
        - items
      properties:
        status:
          type: string
          enum: [draft, active]
        items:
          type: array
          items:
            type: object
            required:
              - materialId
              - quantityRequired
              - unit
            properties:
              materialId:
                type: string
                format: uuid
              quantityRequired:
                type: number
                format: decimal
              unit:
                type: string

    UpdateBoMStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [draft, active, inactive]

    AddBoMItemRequest:
      type: object
      required:
        - materialId
        - quantityRequired
        - unit
      properties:
        materialId:
          type: string
          format: uuid
        quantityRequired:
          type: number
          format: decimal
        unit:
          type: string

    UpdateBoMItemRequest:
      type: object
      properties:
        quantityRequired:
          type: number
          format: decimal
        unit:
          type: string

    # ========== Production Plan Schemas ==========
    ProductionPlan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plan_date:
          type: string
          format: date
        target_completion_date:
          type: string
          format: date
        ho_order_reference:
          type: string
        notes:
          type: string
        status:
          type: string
          enum: [draft, submitted, approved, rejected, in_progress, completed, cancelled, edit_requested]
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductionPlanItem'
        approvalHistory:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalHistory'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductionPlanItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: number
          format: decimal
        material_priorities:
          type: object
        status:
          type: string
        materialRequirements:
          type: array
          items:
            $ref: '#/components/schemas/MaterialRequirement'

    MaterialRequirement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        itemId:
          type: string
          format: uuid
        materialId:
          type: string
          format: uuid
        material:
          $ref: '#/components/schemas/Product'
        requiredQuantity:
          type: number
          format: decimal
        availableStock:
          type: number
          format: decimal
        shortageQuantity:
          type: number
          format: decimal
        status:
          type: string
          enum: [pending, allocated, purchased, received, shortage_accepted]
        priority_weight:
          type: number
          format: decimal

    CreateProductionPlanRequest:
      type: object
      required:
        - plan_date
        - target_completion_date
      properties:
        plan_date:
          type: string
          format: date
        target_completion_date:
          type: string
          format: date
        ho_order_reference:
          type: string
        notes:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
                format: uuid
              quantity:
                type: number
              material_priorities:
                type: object

    UpdateProductionPlanRequest:
      type: object
      properties:
        plan_date:
          type: string
          format: date
        target_completion_date:
          type: string
          format: date
        ho_order_reference:
          type: string
        notes:
          type: string

    SubmitPlanRequest:
      type: object
      properties:
        notes:
          type: string

    ApprovePlanRequest:
      type: object
      properties:
        notes:
          type: string

    RejectPlanRequest:
      type: object
      required:
        - notes
      properties:
        notes:
          type: string

    CancelPlanRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string

    RequestEditRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string

    AddPlanItemRequest:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: number
        material_priorities:
          type: object

    UpdatePlanItemRequest:
      type: object
      properties:
        quantity:
          type: number
        material_priorities:
          type: object

    UpdateMaterialPrioritiesRequest:
      type: object
      properties:
        material_priorities:
          type: object

    UpdateMrItemStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [pending, allocated, purchased, received, shortage_accepted]
        notes:
          type: string

    SetPriorityWeightsRequest:
      type: object
      properties:
        weights:
          type: object

    AutoDistributeWeightsRequest:
      type: object
      required:
        - strategy
      properties:
        strategy:
          type: string
          enum: [equal, proportional, custom]
        options:
          type: object

    # ========== Work Order Schemas ==========
    WorkOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: number
          format: decimal
        quantityCompleted:
          type: number
          format: decimal
        target_date:
          type: string
          format: date
        notes:
          type: string
        status:
          type: string
          enum: [draft, released, in_progress, marked_qc, qc_in_progress, qc_passed, qc_failed, completed, cancelled]
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WOStep'
        progress:
          $ref: '#/components/schemas/WOProgress'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WOStep:
      type: object
      properties:
        id:
          type: string
          format: uuid
        woId:
          type: string
          format: uuid
        name:
          type: string
        sequence:
          type: integer
        status:
          type: string
          enum: [pending, in_progress, completed]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    WOProgress:
      type: object
      properties:
        id:
          type: string
          format: uuid
        woId:
          type: string
          format: uuid
        currentStepId:
          type: string
          format: uuid
        quantity:
          type: number
          format: decimal
        photos:
          type: array
          items:
            $ref: '#/components/schemas/ProgressPhoto'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProgressPhoto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        progressId:
          type: string
          format: uuid
        url:
          type: string
        caption:
          type: string
        uploadedAt:
          type: string
          format: date-time

    CreateWORequest:
      type: object
      required:
        - product_id
        - quantity
        - target_date
      properties:
        plan_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        quantity:
          type: number
        target_date:
          type: string
          format: date
        notes:
          type: string

    UpdateWORequest:
      type: object
      properties:
        target_date:
          type: string
          format: date
        notes:
          type: string

    CancelWORequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string

    # ========== QC Session Schemas ==========
    QCSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        woId:
          type: string
          format: uuid
        workOrder:
          $ref: '#/components/schemas/WorkOrder'
        status:
          type: string
          enum: [in_progress, completed]
        result:
          type: string
          enum: [pass, fail, pending]
        notes:
          type: string
        findings:
          type: array
          items:
            $ref: '#/components/schemas/QCFinding'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    QCFinding:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        description:
          type: string
        reworkNotes:
          type: string
        status:
          type: string
          enum: [open, resolved]
        photos:
          type: array
          items:
            $ref: '#/components/schemas/QCFindingPhoto'
        resolvedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    QCFindingPhoto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        findingId:
          type: string
          format: uuid
        url:
          type: string
        type:
          type: string
          enum: [finding, rework]
        uploadedAt:
          type: string
          format: date-time

    AddFindingRequest:
      type: object
      required:
        - description
        - reworkNotes
      properties:
        description:
          type: string
        reworkNotes:
          type: string

    QCNotesRequest:
      type: object
      properties:
        notes:
          type: string

    # ========== Purchase Request Schemas ==========
    PurchaseRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mr_id:
          type: string
          format: uuid
        required_date:
          type: string
          format: date
        priority:
          type: string
          enum: [low, medium, high, urgent]
        notes:
          type: string
        lead_time_estimate:
          type: integer
        status:
          type: string
          enum: [draft, submitted, approved, rejected, processing, do_issued, resubmitted, cancelled]
        items:
          type: array
          items:
            $ref: '#/components/schemas/PRItem'
        approvalHistory:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalHistory'
        deliveryOrders:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryOrder'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PRItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        prId:
          type: string
          format: uuid
        materialId:
          type: string
          format: uuid
        material:
          $ref: '#/components/schemas/Product'
        quantityRequested:
          type: number
          format: decimal
        quantityApproved:
          type: number
          format: decimal
        quantityReceived:
          type: number
          format: decimal
        unit:
          type: string
        notes:
          type: string

    ApprovalHistory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entityType:
          type: string
        entityId:
          type: string
        approverId:
          type: string
          format: uuid
        approver:
          $ref: '#/components/schemas/User'
        action:
          type: string
          enum: [approve, reject, request_edit]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    CreatePRRequest:
      type: object
      required:
        - required_date
        - priority
        - items
      properties:
        mr_id:
          type: string
          format: uuid
        required_date:
          type: string
          format: date
        priority:
          type: string
          enum: [low, medium, high, urgent]
        notes:
          type: string
        lead_time_estimate:
          type: integer
        items:
          type: array
          items:
            type: object
            required:
              - materialId
              - quantityRequested
            properties:
              materialId:
                type: string
                format: uuid
              quantityRequested:
                type: number
              notes:
                type: string

    UpdatePRRequest:
      type: object
      properties:
        required_date:
          type: string
          format: date
        priority:
          type: string
        notes:
          type: string
        lead_time_estimate:
          type: integer
        items:
          type: array
          items:
            type: object

    SubmitPRRequest:
      type: object
      properties:
        notes:
          type: string

    ApprovePRRequest:
      type: object
      properties:
        notes:
          type: string

    RejectPRRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
        notes:
          type: string

    AddPRItemRequest:
      type: object
      required:
        - materialId
        - quantityRequested
      properties:
        materialId:
          type: string
          format: uuid
        quantityRequested:
          type: number
        notes:
          type: string

    UpdatePRItemRequest:
      type: object
      properties:
        quantityRequested:
          type: number
        notes:
          type: string

    UpdateLeadTimeRequest:
      type: object
      properties:
        lead_time_estimate:
          type: integer

    MarkAsProcessingRequest:
      type: object
      properties:
        do_number:
          type: string
        do_date:
          type: string
          format: date

    MarkAsDOIssuedRequest:
      type: object
      properties:
        do_number:
          type: string

    AddNoteRequest:
      type: object
      properties:
        note:
          type: string

    # ========== Delivery Order Schemas ==========
    DeliveryOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        prId:
          type: string
          format: uuid
        do_number:
          type: string
        do_date:
          type: string
          format: date
        status:
          type: string
          enum: [draft, released, partially_received, received, cancelled]
        items:
          type: array
          items:
            $ref: '#/components/schemas/DOItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DOItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        doId:
          type: string
          format: uuid
        prItemId:
          type: string
          format: uuid
        materialId:
          type: string
          format: uuid
        material:
          $ref: '#/components/schemas/Product'
        quantity:
          type: number
          format: decimal
        quantityReceived:
          type: number
          format: decimal
        unit:
          type: string

    # ========== Warehouse Schemas ==========
    Stock:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: number
          format: decimal
        safetyStock:
          type: number
          format: decimal
        location:
          type: string
        lastUpdated:
          type: string
          format: date-time

    GoodsReceipt:
      type: object
      properties:
        id:
          type: string
          format: uuid
        prId:
          type: string
          format: uuid
        purchaseRequest:
          $ref: '#/components/schemas/PurchaseRequest'
        do_number:
          type: string
        gr_date:
          type: string
          format: date
        notes:
          type: string
        status:
          type: string
          enum: [draft, inspection_pending, inspection_in_progress, inspection_approved, inspection_rejected, completed, cancelled]
        items:
          type: array
          items:
            $ref: '#/components/schemas/GRItem'
        bastInbound:
          $ref: '#/components/schemas/BASTInbound'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GRItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        grId:
          type: string
          format: uuid
        prItemId:
          type: string
          format: uuid
        materialId:
          type: string
          format: uuid
        material:
          $ref: '#/components/schemas/Product'
        quantityReceived:
          type: number
          format: decimal
        quantityAccepted:
          type: number
          format: decimal
        quantityRejected:
          type: number
          format: decimal
        unit:
          type: string
        inspectionNotes:
          type: string

    CreateGRRequest:
      type: object
      required:
        - pr_id
        - do_number
        - gr_date
        - items
      properties:
        pr_id:
          type: string
          format: uuid
        do_number:
          type: string
        gr_date:
          type: string
          format: date
        notes:
          type: string
        items:
          type: array
          items:
            type: object
            required:
              - prItemId
              - quantityReceived
            properties:
              prItemId:
                type: string
                format: uuid
              quantityReceived:
                type: number
              inspectionNotes:
                type: string

    UpdateGRRequest:
      type: object
      properties:
        gr_date:
          type: string
          format: date
        notes:
          type: string

    UpdateGRItemRequest:
      type: object
      properties:
        quantityAccepted:
          type: number
        quantityRejected:
          type: number
        inspectionNotes:
          type: string

    CancelGRRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
        notes:
          type: string

    Inspection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        grId:
          type: string
          format: uuid
        goodsReceipt:
          $ref: '#/components/schemas/GoodsReceipt'
        status:
          type: string
          enum: [pending, in_progress, submitted, approved, rejected]
        photos:
          type: array
          items:
            $ref: '#/components/schemas/InspectionPhoto'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InspectionPhoto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        inspectionId:
          type: string
          format: uuid
        url:
          type: string
        uploadedAt:
          type: string
          format: date-time

    BASTInbound:
      type: object
      properties:
        id:
          type: string
          format: uuid
        grId:
          type: string
          format: uuid
        bast_number:
          type: string
        bast_date:
          type: string
          format: date
        status:
          type: string
          enum: [generated, signed]
        pdfUrl:
          type: string
        createdAt:
          type: string
          format: date-time

    GoodsIssue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        woId:
          type: string
          format: uuid
        workOrder:
          $ref: '#/components/schemas/WorkOrder'
        status:
          type: string
          enum: [draft, submitted, approved, rejected, issued, cancelled]
        items:
          type: array
          items:
            $ref: '#/components/schemas/GIItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GIItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        giId:
          type: string
          format: uuid
        materialId:
          type: string
          format: uuid
        material:
          $ref: '#/components/schemas/Product'
        quantityRequested:
          type: number
          format: decimal
        quantityIssued:
          type: number
          format: decimal
        unit:
          type: string

    FinishedGoodsReceipt:
      type: object
      properties:
        id:
          type: string
          format: uuid
        woId:
          type: string
          format: uuid
        workOrder:
          $ref: '#/components/schemas/WorkOrder'
        quantity:
          type: number
          format: decimal
        status:
          type: string
          enum: [received]
        receivedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    WarehouseDO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        do_number:
          type: string
        do_date:
          type: string
          format: date
        status:
          type: string
          enum: [draft, released, partially_delivered, delivered, cancelled]
        items:
          type: array
          items:
            $ref: '#/components/schemas/WarehouseDOItem'
        bastOutbound:
          $ref: '#/components/schemas/BASTOutbound'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WarehouseDOItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        doId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: number
          format: decimal
        quantityDelivered:
          type: number
          format: decimal
        unit:
          type: string

    BASTOutbound:
      type: object
      properties:
        id:
          type: string
          format: uuid
        doId:
          type: string
          format: uuid
        bast_number:
          type: string
        bast_date:
          type: string
          format: date
        fileUrl:
          type: string
        uploadedBy:
          type: string
        uploadedAt:
          type: string
          format: date-time

    SafetyStockUpdateRequest:
      type: object
      required:
        - safety_stock
      properties:
        safety_stock:
          type: number
          format: decimal

    # ========== Dashboard Schemas ==========
    DashboardSummary:
      type: object
      properties:
        production:
          type: object
          properties:
            totalPlans:
              type: integer
            completedPlans:
              type: integer
            inProgressPlans:
              type: integer
            efficiency:
              type: number
        delivery:
          type: object
          properties:
            onTimeDelivery:
              type: number
            totalDeliveries:
              type: integer
        inventory:
          type: object
          properties:
            totalValue:
              type: number
            lowStockItems:
              type: integer
        purchasing:
          type: object
          properties:
            openPRs:
              type: integer
            avgLeadTime:
              type: number

    KPIResponse:
      type: object
      properties:
        metrics:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: number
              unit:
                type: string
              trend:
                type: string
                enum: [up, down, stable]

    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category:
          type: string
          enum: [production, inventory, purchasing, quality]
        severity:
          type: string
          enum: [low, medium, high, critical]
        message:
          type: string
        createdAt:
          type: string
          format: date-time

  parameters:
    # ========== Common Path Parameters ==========
    idParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    productIdParam:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    planIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    woIdParam:
      name: woId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    stepIdParam:
      name: stepId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    progressIdParam:
      name: progressId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    photoIdParam:
      name: photoId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    sessionIdParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    findingIdParam:
      name: findingId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    prIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    itemIdParam:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    grIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    giIdParam:
      name: giId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    doIdParam:
      name: doId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    bastIdParam:
      name: bastId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    # ========== Common Query Parameters ==========
    pageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number for pagination

    limitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Number of items per page

    searchParam:
      name: search
      in: query
      required: false
      schema:
        type: string
        maxLength: 255
      description: Search term

    sortByParam:
      name: sortBy
      in: query
      required: false
      schema:
        type: string
      description: Field to sort by

    sortOrderParam:
      name: sortOrder
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
      description: Sort order

    startDateParam:
      name: startDate
      in: query
      required: false
      schema:
        type: string
        format: date
      description: Start date filter (YYYY-MM-DD)

    endDateParam:
      name: endDate
      in: query
      required: false
      schema:
        type: string
        format: date
      description: End date filter (YYYY-MM-DD)

    statusParam:
      name: status
      in: query
      required: false
      schema:
        type: string
      description: Status filter

security:
  - sessionAuth: []

paths:
  # ========== Health Check ==========
  /api/health:
    get:
      tags:
        - Health Check
      summary: Health check endpoint
      security: []
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: 1.0.0

  # ========== Authentication ==========
  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      responses:
        '200':
          description: Current user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'

  /api/v1/auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== User Management ==========
  /api/v1/users:
    get:
      tags:
        - Users
      summary: List all users
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/searchParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: department
          in: query
          schema:
            type: string
            enum: [GA, FINANCE, PURCHASING, WAREHOUSE, PRODUCTION, QC, PLANNING, SALES]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
    post:
      tags:
        - Users
      summary: Create new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'

  /api/v1/users/{id}:
    parameters:
      - $ref: '#/components/parameters/idParam'
    get:
      tags:
        - Users
      summary: Get user by ID
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
    put:
      tags:
        - Users
      summary: Update user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
    delete:
      tags:
        - Users
      summary: Delete user
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}/deactivate:
    parameters:
      - $ref: '#/components/parameters/idParam'
    post:
      tags:
        - Users
      summary: Deactivate user
      responses:
        '200':
          description: User deactivated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}/reactivate:
    parameters:
      - $ref: '#/components/parameters/idParam'
    post:
      tags:
        - Users
      summary: Reactivate user
      responses:
        '200':
          description: User reactivated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}/reset-password:
    parameters:
      - $ref: '#/components/parameters/idParam'
    post:
      tags:
        - Users
      summary: Reset user password
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}/permissions:
    parameters:
      - $ref: '#/components/parameters/idParam'
    get:
      tags:
        - Users
      summary: Get user permissions
      responses:
        '200':
          description: User permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Permission'

  # ========== Role Management ==========
  /api/v1/roles:
    get:
      tags:
        - Roles
      summary: List roles
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/searchParam'
      responses:
        '200':
          description: List of roles
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Role'
    post:
      tags:
        - Roles
      summary: Create new role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Role created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Role'

  /api/v1/roles/{id}:
    parameters:
      - $ref: '#/components/parameters/idParam'
    get:
      tags:
        - Roles
      summary: Get role by ID
      responses:
        '200':
          description: Role details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Role'
    put:
      tags:
        - Roles
      summary: Update role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Role'
    delete:
      tags:
        - Roles
      summary: Delete role
      responses:
        '200':
          description: Role deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ========== Permissions ==========
  /api/v1/permissions:
    get:
      tags:
        - Permissions
      summary: List all permissions
      responses:
        '200':
          description: List of permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Permission'

  /api/v1/permissions/approvers/{module}:
    parameters:
      - name: module
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Permissions
      summary: Get approvers for module
      responses:
        '200':
          description: List of approvers
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

  # ========== Profile ==========
  /api/v1/profile:
    get:
      tags:
        - Profile
      summary: Get current user profile
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
    put:
      tags:
        - Profile
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'

  /api/v1/profile/change-password:
    post:
      tags:
        - Profile
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOwnPasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/profile/permissions:
    get:
      tags:
        - Profile
      summary: Get own permissions
      responses:
        '200':
          description: Permission list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Permission'

  /api/v1/profile/activity:
    get:
      tags:
        - Profile
      summary: Get activity log
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Activity list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityLog'

  # ========== Audit Logs ==========
  /api/v1/audit-logs:
    get:
      tags:
        - Audit Logs
      summary: List audit logs
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: changedBy
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/startDateParam'
        - $ref: '#/components/parameters/endDateParam'
      responses:
        '200':
          description: Paginated audit logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLog'

  /api/v1/audit-logs/{entityType}/{entityId}:
    parameters:
      - name: entityType
        in: path
        required: true
        schema:
          type: string
      - name: entityId
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Audit Logs
      summary: Get audit history by entity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Entity audit history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'

  # ========== Products ==========
  /api/v1/products:
    get:
